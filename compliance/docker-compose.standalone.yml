version: "3.9"

# Standalone Compliance Service deployment.
# Runs the Compliance Service alone — no URIP dependency.
# Use this for the "Sprinto-replacement product" go-to-market.
#
# Usage:
#   cd compliance/
#   docker-compose -f docker-compose.standalone.yml up -d
#
# Services:
#   compliance_db   — Postgres on port 5434 (different from URIP's 5433)
#   compliance_api  — FastAPI service on port 8001
#
# After starting, apply migrations:
#   docker-compose -f docker-compose.standalone.yml exec compliance_api \
#     alembic upgrade head
#
# Run seeders:
#   docker-compose -f docker-compose.standalone.yml exec compliance_api \
#     python -m compliance_backend.seeders.run_all

services:
  compliance_db:
    image: postgres:16-alpine
    container_name: compliance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance
      POSTGRES_DB: compliance_db
    ports:
      - "5434:5432"
    volumes:
      - compliance_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance -d compliance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  compliance_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: compliance_api
    restart: unless-stopped
    depends_on:
      compliance_db:
        condition: service_healthy
    environment:
      # Auth mode: STANDALONE when running without URIP
      COMPLIANCE_AUTH_MODE: "STANDALONE"
      COMPLIANCE_JWT_SECRET: "change-me-in-production"
      # DB — points at compliance_db service (internal docker network uses service name)
      COMPLIANCE_DB_URL: "postgresql+asyncpg://compliance:compliance@compliance_db:5432/compliance_db"
      # CORS — allow frontend on 3001
      CORS_ORIGINS: '["http://localhost:3001"]'
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  compliance_pgdata:
    driver: local
