# Alembic configuration for Compliance Service DB migrations
# DB: compliance_db on localhost:5434
# Run from: compliance/ directory

[alembic]
script_location = alembic
prepend_sys_path = .

# Points at compliance_db (separate from URIP's postgres on 5433)
# Override with COMPLIANCE_DB_URL env var
sqlalchemy.url = postgresql+asyncpg://compliance:compliance@localhost:5434/compliance_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
