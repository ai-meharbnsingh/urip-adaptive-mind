# docker-compose.prod.yml — Production overlay
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from dev compose:
#   - Ports bound to 127.0.0.1 only (nginx upstream; not publicly exposed)
#   - Tighter resource limits for production sizing
#   - No source-code volume mounts (immutable image)
#   - RATE_LIMIT_STORAGE_URI forced to Redis (see .env.prod.template)
#   - Stricter restart policy
services:
  db:
    restart: always
    # In prod: no host-facing port — only accessible by app/compliance within the docker network.
    ports: []
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    restart: always
    # In prod: no host-facing port.
    ports: []
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    restart: always
    # nginx upstream: proxies to 127.0.0.1:8089 → container :8000
    ports:
      - "127.0.0.1:8089:8000"
    # Production: no live-mount of source — code is baked into the image.
    volumes: []
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://urip:${POSTGRES_PASSWORD}@db:5432/urip
      REDIS_URL: redis://redis:6379/0
      # Force Redis-backed rate limiting in prod (Gemini MEDIUM finding).
      RATE_LIMIT_STORAGE_URI: redis://redis:6379/1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G

  compliance:
    restart: always
    # nginx upstream: proxies to 127.0.0.1:8091 → container :8001
    ports:
      - "127.0.0.1:8091:8001"
    volumes: []
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://urip:${POSTGRES_PASSWORD}@db:5432/urip_compliance
      COMPLIANCE_DB_URL: postgresql+asyncpg://urip:${POSTGRES_PASSWORD}@db:5432/urip_compliance
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G

  celery_worker:
    restart: always
    volumes: []
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://urip:${POSTGRES_PASSWORD}@db:5432/urip
      REDIS_URL: redis://redis:6379/0
    deploy:
      resources:
        limits:
          memory: 1G

  celery_beat:
    restart: always
    volumes: []
    env_file: .env.prod
    environment:
      REDIS_URL: redis://redis:6379/0
    deploy:
      resources:
        limits:
          memory: 512M
