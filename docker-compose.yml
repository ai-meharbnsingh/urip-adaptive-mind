services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: urip
      POSTGRES_USER: urip
      POSTGRES_PASSWORD: urip_dev
    ports:
      - "5433:5432"
    volumes:
      - urip_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urip"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend
      - ./backend:/app/backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://urip:urip_dev@db:5433/urip

volumes:
  urip_pgdata:
