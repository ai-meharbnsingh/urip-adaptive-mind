services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: urip
      POSTGRES_USER: urip
      POSTGRES_PASSWORD: urip_dev
    ports:
      - "5433:5432"
    volumes:
      - urip_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urip"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ──────────────────────────────────────────────────────────────────────
  # Redis — broker + result backend for Celery (connector pulls, scoring
  # recompute, control checks). The URIP backend reads REDIS_URL at boot.
  # ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - urip_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend
      - ./backend:/app/backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://urip:urip_dev@db:5432/urip
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G

  # ──────────────────────────────────────────────────────────────────────
  # Compliance backend — separate FastAPI on port 8001.
  #
  # Gap 8 (Gemini AUDIT_GEMINI_DEPLOYMENT.md, severity MEDIUM): adding the
  # compliance service to the root compose so a single `docker compose up`
  # brings the whole stack online.  Previously the operator had to use
  # compliance/docker-compose.standalone.yml in a separate window.
  #
  # Build context = compliance/backend/ — that's where compliance/backend/
  # Dockerfile expects pyproject.toml + compliance_backend/ source to live.
  # Cross-context COPYs from the parent (../alembic/) are unsupported by
  # Docker build; instead we mount the whole compliance/ tree at runtime so
  # alembic config and source edits are picked up without a rebuild.
  #
  # Database: shares the same Postgres instance as URIP via a dedicated
  # logical database `urip_compliance` (kept separate so schema migrations
  # don't collide).  Operator one-liners for first launch:
  #   docker compose exec db psql -U urip -c 'CREATE DATABASE urip_compliance;'
  #   docker compose exec compliance alembic -c /app/compliance/alembic.ini upgrade head
  # ──────────────────────────────────────────────────────────────────────
  compliance:
    build:
      context: ./compliance/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./compliance:/app/compliance
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://urip:urip_dev@db:5432/urip_compliance
      COMPLIANCE_DB_URL: postgresql+asyncpg://urip:urip_dev@db:5432/urip_compliance
    command:
      - uvicorn
      - compliance_backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G

  # ──────────────────────────────────────────────────────────────────────
  # Celery worker — runs the actual task bodies (connector_pull_task,
  # scoring_recompute_task, control_check_task). Scale with --scale
  # celery_worker=N for additional throughput.
  # ──────────────────────────────────────────────────────────────────────
  celery_worker:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./connectors:/app/connectors
      - ./compliance:/app/compliance
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://urip:urip_dev@db:5432/urip
      REDIS_URL: redis://redis:6379/0
    command:
      - celery
      - -A
      - backend.services.celery_app
      - worker
      - --loglevel=info
      - --concurrency=4
    deploy:
      resources:
        limits:
          memory: 1G

  # ──────────────────────────────────────────────────────────────────────
  # Celery beat — schedules the three periodic jobs:
  #   connector-pull-every-15min     → fan-out to one task per (tenant, connector)
  #   scoring-recompute-hourly       → RiskScoreSummary refresh
  #   control-check-every-6h         → compliance ControlEngine sweep
  # Beat is a SINGLETON — only one instance must run at a time, otherwise
  # jobs would be queued multiple times. Hence no replicas / scale.
  # ──────────────────────────────────────────────────────────────────────
  celery_beat:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./connectors:/app/connectors
      - ./compliance:/app/compliance
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command:
      - celery
      - -A
      - backend.services.celery_app
      - beat
      - --loglevel=info
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  urip_pgdata:
  urip_redis_data:
