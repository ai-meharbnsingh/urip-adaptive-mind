<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modules | URIP - Unified Risk Intelligence Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/app.css?v=20260439">
</head>
<body class="urip-app">
  <div id="app-shell" data-page="admin-modules">

    <div class="page-header">
      <div>
        <h1 class="page-title">Capability Modules</h1>
        <p class="page-subtitle" id="pageSubtitle">Enable / disable modules and choose billing tier</p>
      </div>
      <div class="flex gap-2">
        <input class="form-input" id="tenantSlugInput" type="text" placeholder="tenant slug (super-admin only)" style="max-width:240px" aria-label="Tenant slug">
        <button class="btn btn-outline" id="btnLoad" type="button">
          <i class="fas fa-search"></i> Load
        </button>
      </div>
    </div>

    <div id="modulesLoading" class="empty-state">
      <div class="empty-state-icon"><i class="fas fa-spinner fa-spin"></i></div>
      <div class="empty-state-title">Loading modules...</div>
    </div>

    <div id="modulesError" class="alert alert-danger" style="display:none">
      <i class="fas fa-exclamation-circle"></i>
      <span id="modulesErrorMsg"></span>
    </div>

    <div id="modulesContent" style="display:none">
      <div class="modules-grid" id="modulesGrid"></div>

      <div class="alert alert-info" id="readOnlyNotice" style="display:none;margin-top:1.5rem">
        <i class="fas fa-info-circle"></i>
        <span>Tenant admins can view modules but only super-admins can change tier or toggle them.</span>
      </div>
    </div>
  </div>

  <script src="js/theming.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js?v=20260439"></script>
  <script>
    if (typeof checkAuth === 'function') checkAuth();
    document.addEventListener('DOMContentLoaded', function () {
      window.URIP.shell.mount({
        page: 'admin-modules',
        title: 'Capability Modules',
        breadcrumb: 'Administration / Modules'
      });
    });
  </script>
  <script src="js/admin-modules.js"></script>
</body>
</html>
