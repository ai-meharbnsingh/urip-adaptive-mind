<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSPM Control Detail | URIP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="urip-app">
  <div id="app-shell" data-page="cspm-dashboard">

    <div class="page-header">
      <div>
        <h1 class="page-title" id="controlTitle">Control Detail</h1>
        <p class="page-subtitle" id="controlSubtitle">Drill-down per control</p>
      </div>
    </div>
    <div class="card">
      <div class="card-body" id="controlDetailBody">
        <p class="text-gray">Select a control from the Findings page.</p>
      </div>
    </div>
  </div>

  <script src="js/theming.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.URIP.shell.mount({
        page: 'cspm-dashboard',
        title: 'CSPM Control Detail',
        breadcrumb: 'Strategic Modules / CSPM / Control'
      });
    });
  </script>
  <script src="js/cspm-control-detail.js"></script>
</body>
</html>
