<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenants | URIP - Unified Risk Intelligence Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/app.css?v=20260436">
</head>
<body class="urip-app">
  <div id="app-shell" data-page="admin-tenants">

    <div class="page-header">
      <div>
        <h1 class="page-title">Tenants</h1>
        <p class="page-subtitle">Onboard and manage tenant organisations (super-admin only)</p>
      </div>
      <button class="btn btn-primary" id="btnNewTenant">
        <i class="fas fa-plus"></i> New tenant
      </button>
    </div>

    <div id="tenantsLoading" class="empty-state">
      <div class="empty-state-icon"><i class="fas fa-spinner fa-spin"></i></div>
      <div class="empty-state-title">Loading tenants...</div>
    </div>

    <div id="tenantsError" class="alert alert-danger" style="display:none">
      <i class="fas fa-exclamation-circle"></i>
      <span id="tenantsErrorMsg"></span>
    </div>

    <div id="tenantsContent" style="display:none">
      <div class="card">
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th scope="col">Name</th>
                <th scope="col">Slug</th>
                <th scope="col">Domain</th>
                <th scope="col">Status</th>
                <th scope="col">Created</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody id="tenantsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- New Tenant modal -->
  <div class="modal-overlay" id="newTenantModal">
    <div class="modal">
      <div class="modal-header">
        <strong>Create new tenant</strong>
        <button class="btn btn-ghost btn-icon" id="closeNewTenant" type="button" aria-label="Close">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="newTenantForm">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="tn_name">Organisation name</label>
            <input class="form-input" id="tn_name" name="name" type="text" required minlength="1" maxlength="200" placeholder="Tenant name">
          </div>
          <div class="form-group">
            <label class="form-label" for="tn_slug">Slug</label>
            <input class="form-input" id="tn_slug" name="slug" type="text" required minlength="1" maxlength="100" pattern="^[a-z0-9-]+$" placeholder="tenant-slug">
            <div class="form-hint">Lowercase letters, digits, and hyphens. Used in subdomain and URLs.</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="tn_domain">Primary email domain</label>
            <input class="form-input" id="tn_domain" name="domain" type="text" required minlength="1" maxlength="255" placeholder="tenant.com">
          </div>
          <div class="form-group">
            <label class="form-label" for="tn_email">Primary contact email</label>
            <input class="form-input" id="tn_email" name="primary_contact_email" type="email" placeholder="admin@example.com">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" type="button" id="cancelNewTenant">Cancel</button>
          <button class="btn btn-primary" type="submit" id="submitNewTenant">
            <i class="fas fa-check"></i> Create tenant
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/theming.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js?v=20260436"></script>
  <script>
    if (typeof checkAuth === 'function') checkAuth();
    document.addEventListener('DOMContentLoaded', function () {
      window.URIP.shell.mount({
        page: 'admin-tenants',
        title: 'Tenants',
        breadcrumb: 'Administration / Tenants'
      });
    });
  </script>
  <script src="js/admin-tenants.js"></script>
</body>
</html>
