<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | URIP - Unified Risk Intelligence Platform</title>

  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/main.css">

  <style>
    /* Login page specific styles */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .login-bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://images.unsplash.com/photo-1558494949-ef526b004297?w=1920&q=80');
      background-size: cover;
      background-position: center;
      filter: brightness(0.3);
    }

    .login-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(13, 27, 42, 0.95) 0%, rgba(8, 18, 28, 0.98) 100%);
    }

    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      margin: 2rem;
      animation: fadeInCard 0.5s ease;
    }

    @keyframes fadeInCard {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card-inner {
      background-color: #FFFFFF;
      border-radius: 16px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    .login-header {
      padding: 2.5rem 2rem 1.5rem;
      text-align: center;
      background: linear-gradient(135deg, #0D1B2A 0%, #1B2838 100%);
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .login-logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1ABC9C 0%, #16A085 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.75rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 8px 24px rgba(26, 188, 156, 0.3);
    }

    .login-logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 0.25rem;
    }

    .login-logo h1 span {
      color: #1ABC9C;
    }

    .login-logo p {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 400;
    }

    .login-body {
      padding: 2rem;
    }

    .login-form .form-group {
      margin-bottom: 1.25rem;
    }

    .login-form .form-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #334155;
      margin-bottom: 0.5rem;
    }

    .login-form .form-label i {
      color: #1ABC9C;
      font-size: 0.875rem;
    }

    .login-form .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      font-size: 0.9375rem;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      background-color: #F8FAFC;
      color: #1E293B;
      transition: all 0.2s ease;
    }

    .login-form .form-input:focus {
      outline: none;
      border-color: #1ABC9C;
      background-color: #FFFFFF;
      box-shadow: 0 0 0 3px rgba(26, 188, 156, 0.1);
    }

    .login-form .form-input::placeholder {
      color: #94A3B8;
    }

    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #64748B;
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #1ABC9C;
      cursor: pointer;
    }

    .forgot-password {
      font-size: 0.875rem;
      color: #1ABC9C;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .forgot-password:hover {
      color: #16A085;
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: #FFFFFF;
      background: linear-gradient(135deg, #1ABC9C 0%, #16A085 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(26, 188, 156, 0.35);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-error {
      display: none;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      background-color: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.2);
      border-radius: 8px;
      color: #E74C3C;
      font-size: 0.875rem;
    }

    .login-footer {
      padding: 1.25rem 2rem;
      background-color: #F8FAFC;
      border-top: 1px solid #E2E8F0;
      text-align: center;
    }

    .login-footer p {
      font-size: 0.8125rem;
      color: #64748B;
      margin-bottom: 0.75rem;
    }

    .security-badges {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .security-badge {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      color: #94A3B8;
    }

    .security-badge i {
      color: #1ABC9C;
    }

    .login-copyright {
      position: absolute;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      z-index: 10;
    }

    /* Floating particles animation */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(26, 188, 156, 0.3);
      border-radius: 50%;
      animation: float 15s infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        margin: 1rem;
      }

      .login-header {
        padding: 2rem 1.5rem 1rem;
      }

      .login-body {
        padding: 1.5rem;
      }

      .login-options {
        flex-direction: column;
        gap: 0.75rem;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <!-- Background Image -->
    <div class="login-bg-image"></div>
    <div class="login-overlay"></div>

    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="login-card-inner">
        <!-- Header -->
        <div class="login-header">
          <div class="login-logo">
            <div class="login-logo-icon">
              <i class="fas fa-shield-alt"></i>
            </div>
            <h1>Semantic <span>Gravity</span></h1>
            <p>Unified Risk Intelligence Platform</p>
          </div>
        </div>

        <!-- Body -->
        <div class="login-body">
          <div class="login-error" id="loginError"></div>
          <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label class="form-label">
                <i class="fas fa-envelope"></i>
                Email Address
              </label>
              <input
                type="email"
                id="loginEmail"
                class="form-input"
                placeholder="Enter your email"
                required
              >
            </div>

            <div class="form-group">
              <label class="form-label">
                <i class="fas fa-lock"></i>
                Password
              </label>
              <input
                type="password"
                id="loginPassword"
                class="form-input"
                placeholder="Enter your password"
                required
              >
            </div>

            <div class="login-options">
              <label class="remember-me">
                <input type="checkbox">
                Remember me
              </label>
              <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
              <i class="fas fa-sign-in-alt"></i>
              Sign In
            </button>

            <div style="margin-top: 1rem; text-align: center;">
              <a href="register.html" class="forgot-password">Sign up</a>
            </div>
          </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
          <p>Enterprise-grade security powered by</p>
          <div class="security-badges">
            <span class="security-badge">
              <i class="fas fa-lock"></i>
              SOC 2 Compliant
            </span>
            <span class="security-badge">
              <i class="fas fa-certificate"></i>
              ISO 27001
            </span>
            <span class="security-badge">
              <i class="fas fa-shield-alt"></i>
              GDPR Ready
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Copyright -->
    <div class="login-copyright">
      &copy; 2026 Semantic Gravity. All rights reserved. | v2.4.1
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/theming.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Generate floating particles
    function createParticles() {
      const container = document.getElementById('particles');
      const particleCount = 30;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (10 + Math.random() * 10) + 's';
        container.appendChild(particle);
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', createParticles);
  </script>
</body>
</html>
