<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Detail | URIP - Unified Risk Intelligence Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/app.css?v=20260434">
  <link rel="stylesheet" href="css/domain-page.css">
</head>
<body class="urip-app">
  <div id="app-shell" data-page="asset-inventory">
        <div class="page-header">
          <div>
            <a href="asset-inventory.html" style="font-size:13px;color:var(--gray-500);text-decoration:none">
              <i class="fas fa-chevron-left"></i> Asset Inventory
            </a>
            <h1 class="page-title" id="assetTitle" style="margin-top:0.25rem">Asset Detail</h1>
            <p class="page-subtitle" id="assetSubtitle">Loading…</p>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-outline" id="btnStar" type="button">
              <i class="far fa-star"></i> <span id="starLabel">Flag Critical</span>
            </button>
            <button class="btn btn-outline" id="btnViewRaw" type="button" disabled>
              <i class="fas fa-code"></i> View Raw Data
            </button>
          </div>
        </div>

        <!-- Metadata card -->
        <div class="card" style="padding:1.25rem;margin-bottom:1.25rem">
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem">
            <div>
              <div style="font-size:11px;text-transform:uppercase;color:var(--gray-500);font-weight:600;letter-spacing:0.06em">Hostname / Asset</div>
              <div id="metaAsset" style="font-size:14px;color:var(--gray-900);margin-top:4px;font-weight:500;word-break:break-all">—</div>
            </div>
            <div>
              <div style="font-size:11px;text-transform:uppercase;color:var(--gray-500);font-weight:600;letter-spacing:0.06em">Category</div>
              <div id="metaCategory" style="font-size:14px;color:var(--gray-900);margin-top:4px">—</div>
            </div>
            <div>
              <div style="font-size:11px;text-transform:uppercase;color:var(--gray-500);font-weight:600;letter-spacing:0.06em">Open Risks</div>
              <div id="metaRiskCount" style="font-size:14px;color:var(--gray-900);margin-top:4px;font-weight:500">—</div>
            </div>
            <div>
              <div style="font-size:11px;text-transform:uppercase;color:var(--gray-500);font-weight:600;letter-spacing:0.06em">Max Score</div>
              <div id="metaMaxScore" style="font-size:14px;color:var(--gray-900);margin-top:4px;font-weight:500">—</div>
            </div>
            <div>
              <div style="font-size:11px;text-transform:uppercase;color:var(--gray-500);font-weight:600;letter-spacing:0.06em">Owner Team</div>
              <div id="metaOwner" style="margin-top:4px">
                <input type="text" class="form-input" id="ownerInput" placeholder="Assign owner team…" style="font-size:13px">
              </div>
            </div>
            <div>
              <div style="font-size:11px;text-transform:uppercase;color:var(--gray-500);font-weight:600;letter-spacing:0.06em">Last Seen</div>
              <div id="metaLastSeen" style="font-size:14px;color:var(--gray-900);margin-top:4px">—</div>
            </div>
          </div>

          <!-- Tags row -->
          <div style="margin-top:1rem">
            <div style="font-size:11px;text-transform:uppercase;color:var(--gray-500);font-weight:600;letter-spacing:0.06em;margin-bottom:6px">Custom Tags</div>
            <div id="tagsRow" style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
              <input type="text" class="form-input" id="tagInput" placeholder="Add tag and press Enter…" style="font-size:13px;max-width:200px">
            </div>
          </div>
        </div>

        <!-- Risk timeline -->
        <div class="section-row">
          <h2>Risk Timeline (all risks ever raised on this asset)</h2>
        </div>
        <div class="risk-table-card">
          <table>
            <thead><tr><th>ID</th><th>Finding</th><th>Source</th><th>Severity</th><th>Score</th><th>Status</th><th>Created</th></tr></thead>
            <tbody id="riskTimelineBody">
              <tr><td colspan="7" style="padding:2rem;text-align:center;color:#94A3B8">Loading…</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Raw data drawer (Hybrid-SaaS gated) -->
        <div id="rawDataDrawer" style="display:none;margin-top:1.25rem">
          <div class="card" style="padding:1.25rem">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
              <h3 style="font-size:1rem;font-weight:600">Raw Connector Data</h3>
              <button class="btn btn-sm btn-ghost" id="btnCloseRaw" type="button"><i class="fas fa-times"></i> Close</button>
            </div>
            <pre id="rawDataPre" style="background:var(--gray-900);color:var(--gray-100);padding:1rem;border-radius:8px;font-size:12px;overflow:auto;max-height:400px"></pre>
          </div>
        </div>
  </div>

  <script src="js/theming.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js?v=20260434"></script>
  <script>
    if (typeof checkAuth === 'function') checkAuth();
    document.addEventListener('DOMContentLoaded', function () {
      window.URIP.shell.mount({
        page: 'asset-inventory',
        title: 'Asset Detail',
        breadcrumb: 'Operations / Asset Inventory / Detail'
      });
    });
  </script>
  <script src="js/domain-page.js"></script>
  <script src="js/asset-detail.js"></script>
</body>
</html>
