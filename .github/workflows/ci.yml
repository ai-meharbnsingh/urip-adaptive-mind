name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check backend/ --select E,F,W --ignore E501

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. pytest tests/ -v --tb=short -x

  # Gemini MEDIUM finding (AUDIT_GEMINI_TRI_A.md) — Supply chain / CVE scanning.
  # Runs pip-audit against requirements.txt on every PR and push to main.
  # Uses the OSV advisory database (FOSS, no API key required).
  # The job is non-blocking on the first introduction (--strict flags a non-zero
  # exit on any finding); operators should triage and pin/upgrade affected packages.
  security:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies for known CVEs
        run: pip-audit -r requirements.txt --strict --vulnerability-service osv
